name: Deploy Production to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.PROJECT_PROD_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Production Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.WEBDEV_VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.WEBDEV_VERCEL_TOKEN }}

      - name: Deploy Prebuilt Project
        run: vercel deploy --prebuilt --prod --token=${{ secrets.WEBDEV_VERCEL_TOKEN }}